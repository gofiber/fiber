<!DOCTYPE html>
<!-- Shared gofiber benchmark page. Canonical copy: gofiber/.github/.github/actions/benchmark-pages/index.html
     Deployed to every repo's gh-pages by the benchmark-pages action; local edits are overwritten. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- inline icon: keeps browsers from requesting a nonexistent /favicon.ico -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <title>Benchmarks</title>
  <style>
    :root {
      --page: #f9f9f7;
      --surface: #fcfcfb;
      --ink: #0b0b0b;
      --ink-2: #52514e;
      --muted: #898781;
      --grid: #e1e0d9;
      --baseline: #c3c2b7;
      --border: rgba(11, 11, 11, 0.1);
      --accent: #2a78d6;
      --seg-active-bg: #1c5cab;
      --seg-active-fg: #ffffff;
      --delta-good: #006300;
      --delta-bad: #d03b3b;
      --series-1: #2a78d6;
      --series-2: #1baf7a;
      --series-3: #eda100;
      --series-4: #008300;
      --series-5: #4a3aa7;
      --series-6: #e34948;
      --series-7: #e87ba4;
      --series-8: #eb6834;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --page: #0d0d0d;
        --surface: #1a1a19;
        --ink: #ffffff;
        --ink-2: #c3c2b7;
        --muted: #898781;
        --grid: #2c2c2a;
        --baseline: #383835;
        --border: rgba(255, 255, 255, 0.1);
        --accent: #3987e5;
        --seg-active-bg: #3987e5;
        --seg-active-fg: #0b0b0b;
        --delta-good: #0ca30c;
        --delta-bad: #d03b3b;
        --series-1: #3987e5;
        --series-2: #199e70;
        --series-3: #c98500;
        --series-4: #008300;
        --series-5: #9085e9;
        --series-6: #e66767;
        --series-7: #d55181;
        --series-8: #d95926;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    a { color: var(--accent); }
    header.page {
      padding: 16px 20px 4px;
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px 16px;
    }
    header.page h1 { font-size: 20px; margin: 0; }
    header.page .meta { color: var(--ink-2); font-size: 13px; }
    #toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--page);
      background: color-mix(in srgb, var(--page) 88%, transparent);
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--grid);
    }
    #toolbar[hidden] { display: none; }
    #toolbar input[type="search"], #toolbar select {
      font: inherit;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--baseline);
      border-radius: 6px;
      padding: 6px 10px;
    }
    #toolbar input[type="search"] { flex: 1 1 180px; min-width: 140px; }
    #toolbar select { max-width: 220px; }
    .seg { display: inline-flex; border: 1px solid var(--baseline); border-radius: 6px; overflow: hidden; }
    .seg button {
      font: inherit;
      font-size: 13px;
      border: 0;
      background: var(--surface);
      color: var(--ink-2);
      padding: 6px 10px;
      cursor: pointer;
    }
    .seg button + button { border-left: 1px solid var(--baseline); }
    .seg button[aria-pressed="true"] { background: var(--seg-active-bg); color: var(--seg-active-fg); }
    .tool-btn {
      font: inherit;
      font-size: 13px;
      background: var(--surface);
      color: var(--ink-2);
      border: 1px solid var(--baseline);
      border-radius: 6px;
      padding: 6px 10px;
      cursor: pointer;
    }
    .tool-btn:hover, .seg button:hover { color: var(--ink); }
    .tool-btn[aria-pressed="true"] {
      background: var(--seg-active-bg);
      color: var(--seg-active-fg);
      border-color: var(--seg-active-bg);
    }
    #status { padding: 48px 20px; text-align: center; color: var(--ink-2); }
    #status .bar {
      width: min(320px, 80%);
      height: 4px;
      margin: 14px auto 0;
      border-radius: 2px;
      background: var(--grid);
      overflow: hidden;
      position: relative;
    }
    #status .bar::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 40%;
      border-radius: 2px;
      background: var(--accent);
      animation: slide 1.2s ease-in-out infinite alternate;
    }
    @keyframes slide { from { transform: translateX(-30%); } to { transform: translateX(220%); } }
    @media (prefers-reduced-motion: reduce) { #status .bar::after { animation: none; } }
    main { padding: 8px 20px 40px; }
    details.pkg { margin: 14px 0; }
    details.pkg > summary {
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      padding: 8px 10px;
      border-radius: 6px;
      list-style-position: inside;
    }
    details.pkg > summary:hover { background: var(--surface); }
    details.pkg > summary .count { color: var(--muted); font-weight: 400; font-size: 13px; }
    .delta { font-size: 11px; font-weight: 600; color: var(--muted); white-space: nowrap; }
    .delta.bad { color: var(--delta-bad); }
    .delta.good { color: var(--delta-good); }
    #movers {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      margin: 14px 0;
    }
    .mover-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 0;
    }
    .mover-col h4 {
      margin: 0 0 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    button.mover {
      display: flex;
      align-items: baseline;
      gap: 8px;
      width: 100%;
      background: none;
      border: 0;
      border-radius: 4px;
      padding: 4px 4px;
      font: inherit;
      font-size: 12px;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      min-width: 0;
    }
    button.mover:hover { background: var(--page); }
    button.mover .delta { flex: none; min-width: 52px; }
    button.mover .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    button.mover .pkg { color: var(--muted); font-size: 11px; margin-left: auto; flex: none; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      gap: 12px;
      padding-top: 10px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px 6px;
      min-width: 0;
    }
    .card h3 {
      margin: 0 0 2px;
      font-size: 13px;
      font-weight: 600;
      word-break: break-word;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .card h3 .name { flex: 1 1 auto; min-width: 0; }
    .card h3 .delta { flex: none; }
    .card h3 .tbl-btn {
      font: inherit;
      font-size: 11px;
      font-weight: 400;
      color: var(--muted);
      background: none;
      border: 1px solid var(--grid);
      border-radius: 4px;
      padding: 1px 6px;
      cursor: pointer;
      flex: none;
    }
    .card h3 .tbl-btn:hover { color: var(--ink); }
    .card .sub { color: var(--muted); font-size: 11px; margin: 0 0 6px; }
    .chart-box { position: relative; height: 200px; }
    .chart-box.tall { height: 230px; }
    .tbl-wrap { overflow-x: auto; }
    .card table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin: 6px 0;
      font-variant-numeric: tabular-nums;
    }
    .card table th, .card table td {
      text-align: right;
      padding: 3px 6px;
      border-bottom: 1px solid var(--grid);
      color: var(--ink-2);
      white-space: nowrap;
    }
    .card table th:first-child, .card table td:first-child { text-align: left; color: var(--ink); }
    .card table thead th { color: var(--ink); position: relative; }
    .key {
      display: inline-block;
      width: 12px;
      height: 3px;
      border-radius: 2px;
      vertical-align: middle;
      margin-right: 4px;
    }
    footer {
      padding: 16px 20px 32px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--grid);
    }
    #lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--page);
      display: flex;
      flex-direction: column;
      padding: 12px 20px 20px;
    }
    #lightbox[hidden] { display: none; }
    .lb-head {
      display: flex;
      align-items: baseline;
      gap: 8px 12px;
      flex-wrap: wrap;
    }
    .lb-head h2 {
      font-size: 16px;
      margin: 0;
      word-break: break-word;
      flex: 1 1 auto;
      min-width: 0;
    }
    .lb-head .sub { color: var(--muted); font-size: 12px; }
    .lb-head .tool-btn { min-width: 40px; }
    .lb-chart {
      flex: 1 1 auto;
      min-height: 0;
      margin-top: 10px;
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }
    .lb-chart.cols-2 { grid-template-columns: 1fr 1fr; }
    .lb-chart.cols-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .lb-cell {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }
    .lb-cell .cap {
      font-size: 12px;
      font-weight: 600;
      margin: 0 0 4px;
      display: flex;
      gap: 8px;
      align-items: baseline;
    }
    .lb-cell .cap .pkg { color: var(--muted); font-weight: 400; font-size: 11px; }
    .lb-cell .holder { flex: 1 1 auto; position: relative; min-height: 0; }
    @media (max-width: 560px) {
      #lightbox { padding: 10px 12px 14px; }
      .lb-chart { overflow-y: auto; }
      .lb-chart.cols-2, .lb-chart.cols-4 { grid-template-columns: 1fr; grid-template-rows: none; }
      .lb-chart.cols-2 .lb-cell, .lb-chart.cols-4 .lb-cell { min-height: 45vh; }
    }
    @media (max-width: 560px) {
      header.page, #toolbar, main, footer { padding-left: 12px; padding-right: 12px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<!-- data-layout is patched to "single" or "multi" by the benchmark-pages sync
     step; "auto" (local previews) probes folders.json and falls back to data.js -->
<body data-layout="single">
  <header class="page">
    <h1>Benchmarks</h1>
    <span class="meta"><a id="repo-link" rel="noopener" href="#">repository</a></span>
    <span class="meta" id="summary-line"></span>
  </header>

  <div id="toolbar" hidden>
    <input id="search" type="search" placeholder="Filter benchmarks&hellip;" aria-label="Filter benchmarks" />
    <select id="pkg-select" aria-label="Package"></select>
    <button class="tool-btn" id="view-toggle" aria-pressed="false">Compare packages</button>
    <span class="seg" id="metric-seg" role="group" aria-label="Metric"></span>
    <span class="seg" id="range-seg" role="group" aria-label="Time range"></span>
    <select id="sort-select" aria-label="Sort">
      <option value="name">Sort: name</option>
      <option value="change">Sort: change</option>
    </select>
    <button class="tool-btn" id="toggle-all">Expand all</button>
    <button class="tool-btn" id="download">Download JSON</button>
  </div>

  <div id="status" role="status">
    Loading benchmark data&hellip;
    <div id="status-detail" class="meta"></div>
    <div class="bar"></div>
  </div>

  <main id="main" hidden></main>

  <div id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Enlarged benchmark chart">
    <div class="lb-head">
      <h2 id="lb-title"></h2>
      <span class="sub" id="lb-sub"></span>
      <span class="seg" id="lb-count" role="group" aria-label="Charts per view">
        <button aria-pressed="true">1</button>
        <button aria-pressed="false">2</button>
        <button aria-pressed="false">4</button>
      </span>
      <button class="tool-btn" id="lb-prev" aria-label="Previous charts">&lsaquo;</button>
      <button class="tool-btn" id="lb-next" aria-label="Next charts">&rsaquo;</button>
      <button class="tool-btn" id="lb-close" aria-label="Close enlarged chart">&times;</button>
    </div>
    <div class="lb-chart" id="lb-chart"></div>
  </div>

  <footer>
    Data collected by
    <a rel="noopener" href="https://github.com/marketplace/actions/continuous-benchmark">github-action-benchmark</a>
    &middot; page maintained in
    <a rel="noopener" href="https://github.com/gofiber/.github">gofiber/.github</a>
  </footer>

  <script>
    /* ---------- pure data logic (kept DOM-free so it can be tested in node) ---------- */
    'use strict';

    // "Benchmark_Foo/case-1 (github.com/gofiber/fiber/v3) - ns/op"
    //   -> { base: "Benchmark_Foo", variant: "case-1", pkg: "github.com/...", metric: "ns/op" }
    function parseName(name) {
      let rest = String(name);
      let metric = null;
      const m = rest.match(/ - ([^ ]*\/[^ ]*)$/);
      if (m) {
        metric = m[1];
        rest = rest.slice(0, m.index);
      }
      let pkg = null;
      const p = rest.match(/ \(([^()]+)\)$/);
      if (p) {
        pkg = p[1];
        rest = rest.slice(0, p.index);
      }
      const slash = rest.indexOf('/');
      return {
        base: slash === -1 ? rest : rest.slice(0, slash),
        variant: slash === -1 ? '' : rest.slice(slash + 1),
        pkg: pkg,
        metric: metric,
      };
    }

    function shortPkg(pkg, repoName) {
      if (!pkg) return '';
      let s = pkg.replace(/^github\.com\/gofiber\//, '');
      if (repoName && s.startsWith(repoName + '/')) s = s.slice(repoName.length + 1);
      if (repoName && s === repoName) s = '';
      return s;
    }

    const METRIC_ORDER = ['ns/op', 'B/op', 'allocs/op', 'MB/s'];

    function sortMetrics(set) {
      return Array.from(set).sort(function (a, b) {
        const ia = METRIC_ORDER.indexOf(a);
        const ib = METRIC_ORDER.indexOf(b);
        return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib) || a.localeCompare(b);
      });
    }

    // sources: [{ label: folderName|null, data: BENCHMARK_DATA }]
    // Returns { sections, metrics, repoUrl, lastUpdate, totalRuns, totalBenches }.
    // A card is one Go benchmark; its variants are the sub-benchmarks, and each
    // variant holds one value series per metric, aligned with source.runs.
    function buildModel(sources) {
      const sections = new Map();
      const metrics = new Set();
      let repoUrl = '';
      let lastUpdate = 0;
      let totalRuns = 0;
      const model = { sections: sections, metrics: [], repoUrl: '', lastUpdate: 0, totalRuns: 0, totalBenches: 0 };

      for (const src of sources) {
        const data = src.data || {};
        if (!repoUrl && data.repoUrl) repoUrl = data.repoUrl;
        if (data.lastUpdate) lastUpdate = Math.max(lastUpdate, data.lastUpdate);
        const suites = data.entries ? Object.values(data.entries) : [];
        const entries = suites.length ? suites[0] : [];
        if (!entries.length) continue;
        totalRuns = Math.max(totalRuns, entries.length);
        const repoName = repoUrl ? repoUrl.replace(/\/+$/, '').split('/').pop() : '';

        const runs = entries.map(function (e) {
          const c = e.commit || {};
          return {
            date: c.timestamp ? String(c.timestamp).slice(0, 10) : '',
            ts: c.timestamp || '',
            sha: c.id ? String(c.id).slice(0, 7) : '',
            url: c.url || '',
            msg: c.message ? String(c.message).split('\n')[0] : '',
          };
        });

        const allNames = new Set();
        for (const e of entries) {
          for (const b of e.benches || []) allNames.add(b.name);
        }

        for (let i = 0; i < entries.length; i++) {
          for (const b of entries[i].benches || []) {
            const parsed = parseName(b.name);
            let metric = parsed.metric;
            if (!metric) {
              // The go extractor emits the plain entry twice: once bare and once
              // with an explicit " - ns/op" suffix. Skip the bare duplicate.
              if (allNames.has(b.name + ' - ns/op')) continue;
              metric = String(b.unit || 'ns/op').split(/\s/)[0];
            }
            const sectionLabel = src.label || shortPkg(parsed.pkg, repoName) || 'other';
            let section = sections.get(sectionLabel);
            if (!section) {
              section = { label: sectionLabel, cards: new Map() };
              sections.set(sectionLabel, section);
            }
            const cardKey = (parsed.pkg || '') + '|' + parsed.base;
            let card = section.cards.get(cardKey);
            if (!card) {
              // first/last mark the run window that actually has data, so charts of
              // renamed or removed benchmarks do not render mostly-empty axes.
              card = { base: parsed.base, pkg: parsed.pkg, section: sectionLabel, runs: runs, variants: new Map(), first: i, last: i };
              section.cards.set(cardKey, card);
            }
            if (i < card.first) card.first = i;
            if (i > card.last) card.last = i;
            let variant = card.variants.get(parsed.variant);
            if (!variant) {
              // slot fixes the variant's color for good: it must not shift when a
              // metric filter hides sibling variants (color follows the entity)
              variant = { name: parsed.variant, series: new Map(), slot: card.variants.size };
              card.variants.set(parsed.variant, variant);
            }
            let arr = variant.series.get(metric);
            if (!arr) {
              arr = new Array(entries.length).fill(null);
              variant.series.set(metric, arr);
            }
            arr[i] = b.value;
            metrics.add(metric);
          }
        }
      }

      let totalBenches = 0;
      for (const section of sections.values()) {
        for (const card of section.cards.values()) totalBenches += card.variants.size;
      }
      model.metrics = sortMetrics(metrics);
      model.repoUrl = repoUrl;
      model.lastUpdate = lastUpdate;
      model.totalRuns = totalRuns;
      model.totalBenches = totalBenches;
      return model;
    }

    function parseDataJs(text) {
      const start = text.indexOf('{');
      const end = text.lastIndexOf('}');
      if (start < 0 || end <= start) throw new Error('unexpected data.js format');
      return JSON.parse(text.slice(start, end + 1));
    }

    // Every Go benchmark function starts with "Benchmark"; drop the noise for display.
    function displayName(base) {
      return String(base).replace(/^Benchmark_?/, '') || base;
    }

    // For every metric except throughput, a higher value is a regression.
    function higherIsBetter(metric) {
      return metric === 'MB/s';
    }

    // Latest value vs the median of up to 10 previous runs. The median damps
    // single-run benchmark noise that a plain last-vs-previous compare amplifies.
    function seriesDelta(arr, first, last) {
      let latestIdx = -1;
      for (let i = last; i >= first; i--) {
        if (arr[i] != null) { latestIdx = i; break; }
      }
      if (latestIdx < 0) return null;
      const prior = [];
      for (let i = latestIdx - 1; i >= first && prior.length < 10; i--) {
        if (arr[i] != null) prior.push(arr[i]);
      }
      if (!prior.length) return null;
      prior.sort(function (a, b) { return a - b; });
      const mid = prior.length >> 1;
      const median = prior.length % 2 ? prior[mid] : (prior[mid - 1] + prior[mid]) / 2;
      if (!median) return null;
      return { pct: ((arr[latestIdx] - median) / median) * 100, latest: arr[latestIdx], baseline: median };
    }

    // The card's most significant recent change across its variants.
    function cardDelta(card, metric) {
      let worst = null;
      for (const variant of card.variants.values()) {
        const arr = variant.series.get(metric);
        if (!arr) continue;
        // comparison variants carry their own run window (one per package)
        const first = variant.first !== undefined ? variant.first : card.first;
        const last = variant.last !== undefined ? variant.last : card.last;
        const delta = seriesDelta(arr, first, last);
        if (delta && (!worst || Math.abs(delta.pct) > Math.abs(worst.pct))) {
          worst = delta;
          worst.variant = variant.name;
        }
      }
      if (worst) worst.regression = higherIsBetter(metric) ? worst.pct < 0 : worst.pct > 0;
      return worst;
    }

    function normToken(value) {
      return String(value).toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    // "Benchmark_Redis_Set" in section "redis" -> "Set";
    // "Benchmark_Ace" in section "ace/v3" -> "" (the variant becomes the key).
    function compareKey(base, sectionLabel) {
      const parts = displayName(base).split('_');
      const sec = normToken(String(sectionLabel).split('/')[0]);
      if (sec && parts.length && normToken(parts[0]) === sec) parts.shift();
      return parts.join('_');
    }

    // Cross-package view: one card per operation/scenario, one series per
    // package, so sub packages can be compared against each other.
    function buildCompareModel(model) {
      const cards = new Map();
      for (const section of model.sections.values()) {
        if (section.label === 'other') continue;
        for (const card of section.cards.values()) {
          for (const variant of card.variants.values()) {
            const op = compareKey(card.base, section.label);
            const key = op && variant.name ? op + '/' + variant.name
              : (op || variant.name || displayName(card.base));
            let compare = cards.get(key);
            if (!compare) {
              compare = { base: key, pkg: null, section: 'comparison', compare: true, first: 0, last: 0, variants: new Map() };
              cards.set(key, compare);
            }
            if (!compare.variants.has(section.label)) {
              compare.variants.set(section.label, {
                name: section.label,
                slot: compare.variants.size,
                series: variant.series,
                runs: card.runs,
                first: card.first,
                last: card.last,
              });
            }
          }
        }
      }
      for (const [key, card] of cards) {
        if (card.variants.size < 2) cards.delete(key);
      }
      return cards;
    }

    function cardMatches(card, query, metric) {
      let hasMetric = false;
      for (const variant of card.variants.values()) {
        if (variant.series.has(metric)) { hasMetric = true; break; }
      }
      if (!hasMetric) return false;
      if (!query) return true;
      const q = query.toLowerCase();
      if (card.base.toLowerCase().includes(q)) return true;
      if (card.pkg && card.pkg.toLowerCase().includes(q)) return true;
      for (const variant of card.variants.keys()) {

        const variantCount = chunks.reduce(function (n, c) { return n + c.length; }, 0);
        const sub = card.pkg ? card.pkg + ' · ' : '';
        node.appendChild(el('p', { class: 'sub', text: card.compare ? variantCount + ' packages' : sub + variantCount + ' series' }));
        const tableWrap = el('div', { class: 'tbl-wrap', hidden: '' }, []);
        node.appendChild(tableWrap);
        tblBtn.addEventListener('click', function () {
          if (tableWrap.hidden) {
            renderTable(card, tableWrap);
            tableWrap.hidden = false;
          } else {
            tableWrap.hidden = true;
            tableWrap.replaceChildren();
          }
        });
        chunks.forEach(function (chunk, index) {
          const box = el('div', { class: 'chart-box' + (chunk.length > 1 ? ' tall' : '') }, []);
          box.$card = card;
          box.$variants = chunk;
          box.$label = displayName(card.base) + ' benchmark trend' +
            (chunks.length > 1 ? ', chart ' + (index + 1) + ' of ' + chunks.length : '');
          node.appendChild(box);
          observer.observe(box);
        });
        zoomBtn.addEventListener('click', function () {
          openLightbox(node.querySelector('.chart-box'), zoomBtn);
        });
        return node;
      }

      function sortedSections() {
        return Array.from(model.sections.values()).sort(function (a, b) {
          // 'other' collects legacy series without a package suffix; keep it last
          if (a.label === 'other' && b.label !== 'other') return 1;
          if (b.label === 'other' && a.label !== 'other') return -1;
          return a.label.localeCompare(b.label);
        });
      }

      function renderMovers(visible, deltas) {
        const movers = [];
        for (const entry of visible) {
          for (const card of entry.cards) {
            const delta = deltas.get(card);
            if (delta && Math.abs(delta.pct) >= MOVER_THRESHOLD) movers.push({ card: card, delta: delta });
          }
        }
        const container = el('section', { id: 'movers' }, []);
        movers.sort(function (a, b) { return Math.abs(b.delta.pct) - Math.abs(a.delta.pct); });
        const groups = [
          { title: 'Regressions (' + state.metric + ')', items: movers.filter(function (m) { return m.delta.regression; }).slice(0, 5) },
          { title: 'Improvements (' + state.metric + ')', items: movers.filter(function (m) { return !m.delta.regression; }).slice(0, 5) },
        ];
        for (const group of groups) {
          if (!group.items.length) continue;
          const col = el('div', { class: 'mover-col' }, [el('h4', { text: group.title }, [])]);
          for (const item of group.items) {
            const btn = el('button', { class: 'mover', type: 'button', title: 'Show ' + displayName(item.card.base) }, [
              deltaBadge(item.delta, state.metric),
              el('span', { class: 'name', text: displayName(item.card.base) }),
              el('span', { class: 'pkg', text: item.card.section === 'other' || item.card.compare ? '' : item.card.section }),
            ]);
            btn.addEventListener('click', function () {
              state.q = displayName(item.card.base);
              $('search').value = state.q;
              writeHash();
              renderSections();
              window.scrollTo({ top: 0 });
            });
            col.appendChild(btn);
          }
          container.appendChild(col);
        }
        if (!container.childElementCount) container.hidden = true;
        return container;
      }

      function renderSections() {
        closeLightbox();
        destroyAllCharts();
        const main = $('main');
        main.replaceChildren();
        const searching = state.q !== '';
        const compareMode = state.view === 'compare';
        $('pkg-select').disabled = compareMode;
        if (compareMode && !model.$compare) {
          model.$compare = { label: 'package comparison', cards: buildCompareModel(model) };
        }
        const sectionList = compareMode ? [model.$compare] : sortedSections();
        const deltas = new Map();
        const visible = [];
        for (const section of sectionList) {
          if (!compareMode && state.pkg !== 'all' && section.label !== state.pkg) continue;
          const cards = [];
          for (const card of section.cards.values()) {
            if (cardMatches(card, state.q, state.metric)) cards.push(card);
          }
          if (!cards.length) continue;
          for (const card of cards) deltas.set(card, cardDelta(card, state.metric));
          if (state.sort === 'change') {
            cards.sort(function (a, b) {
              return Math.abs((deltas.get(b) || { pct: 0 }).pct) - Math.abs((deltas.get(a) || { pct: 0 }).pct);
            });
          } else {
            cards.sort(function (a, b) { return displayName(a.base).localeCompare(displayName(b.base)); });
          }
          visible.push({ section: section, cards: cards });
        }

        if (!searching) main.appendChild(renderMovers(visible, deltas));

        let shown = 0;
        let sections = 0;
        for (const entry of visible) {
          shown += entry.cards.length;
          const grid = el('div', { class: 'grid' }, entry.cards.map(function (card) {
            return renderCard(card, deltas.get(card));
          }));
          const summary = el('summary', null, [
            el('span', { text: entry.section.label + ' ' }),
            el('span', { class: 'count', text: '(' + entry.cards.length + ')' }),
          ]);
          let worst = null;
          for (const card of entry.cards) {
            const delta = deltas.get(card);
            if (delta && delta.regression && Math.abs(delta.pct) >= MOVER_THRESHOLD &&
                (!worst || Math.abs(delta.pct) > Math.abs(worst.pct))) {
              worst = delta;
            }
          }
          if (worst) {
            summary.appendChild(document.createTextNode(' '));
            summary.appendChild(el('span', { class: 'delta bad', text: fmtPct(worst.pct) }));
          }
          const details = el('details', { class: 'pkg' }, [summary, grid]);
          const single = model.sections.size === 1 || state.pkg !== 'all';
          if (single || searching || sections === 0) details.setAttribute('open', '');
          main.appendChild(details);
          sections++;
        }
        if (!shown) {
          main.appendChild(el('p', { class: 'sub', text: 'No benchmarks match the current filter.' }));
        }
        updateToggleAll();
      }

      /* ----- toolbar ----- */
      function updateToggleAll() {
        const all = document.querySelectorAll('details.pkg');
        let open = 0;
        for (const d of all) if (d.open) open++;
        $('toggle-all').textContent = open > all.length / 2 ? 'Collapse all' : 'Expand all';
      }

      function buildToolbar() {
        clampState();
        const search = $('search');
        search.value = state.q;
        let timer = null;
        search.addEventListener('input', function () {
          clearTimeout(timer);
          timer = setTimeout(function () {
            state.q = search.value.trim();
            writeHash();
            renderSections();
          }, 150);
        });

        const select = $('pkg-select');
        select.replaceChildren(el('option', { value: 'all', text: 'All packages (' + model.sections.size + ')' }));
        for (const section of sortedSections()) {
          select.appendChild(el('option', { value: section.label, text: section.label }));
        }
        if (model.sections.size < 2) select.hidden = true;
        select.value = state.pkg;
        select.addEventListener('change', function () {
          state.pkg = select.value;
          writeHash();
          renderSections();
        });

        const seg = $('metric-seg');
        seg.replaceChildren();
        for (const metric of model.metrics) {
          const btn = el('button', { text: metric, 'aria-pressed': String(metric === state.metric) });
          btn.addEventListener('click', function () {
            if (state.metric === metric) return;
            state.metric = metric;
            for (const b of seg.children) b.setAttribute('aria-pressed', String(b.textContent === metric));
            writeHash();
            renderSections();
          });
          seg.appendChild(btn);
        }

        const rangeSeg = $('range-seg');
        rangeSeg.replaceChildren();
        [['30', '30d'], ['90', '90d'], ['all', 'all']].forEach(function (pair) {
          const btn = el('button', { text: pair[1], 'aria-pressed': String(state.range === pair[0]) });
          btn.addEventListener('click', function () {
            if (state.range === pair[0]) return;
            state.range = pair[0];
            for (const b of rangeSeg.children) b.setAttribute('aria-pressed', String(b === btn));
            writeHash();
            renderSections();
          });
          rangeSeg.appendChild(btn);
        });

        const sortSelect = $('sort-select');
        sortSelect.value = state.sort;
        sortSelect.addEventListener('change', function () {
          state.sort = sortSelect.value;
          writeHash();
          renderSections();
        });

        const viewToggle = $('view-toggle');
        if (model.sections.size < 2) viewToggle.hidden = true;
        viewToggle.setAttribute('aria-pressed', String(state.view === 'compare'));
        viewToggle.addEventListener('click', function () {
          state.view = state.view === 'compare' ? 'cards' : 'compare';
          viewToggle.setAttribute('aria-pressed', String(state.view === 'compare'));
          writeHash();
          renderSections();
        });

        $('toggle-all').addEventListener('click', function () {
          const all = document.querySelectorAll('details.pkg');
          let open = 0;
          for (const d of all) if (d.open) open++;
          const target = !(open > all.length / 2);
          for (const d of all) d.open = target;
          updateToggleAll();
        });
        $('main').addEventListener('toggle', updateToggleAll, true);

        $('download').addEventListener('click', function () {
          const payload = model.$sources.length === 1 && model.$sources[0].label === null
            ? model.$sources[0].data
            : model.$sources.map(function (s) { return { package: s.label, data: s.data }; });
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = 'benchmark-data.json';
          link.click();
          URL.revokeObjectURL(link.href);
        });
      }

      /* ----- boot ----- */
      async function boot() {
        readHash();
        try {
          const sources = await loadSources();
          model = buildModel(sources);
          model.$sources = sources;
        } catch (err) {
          $('status').textContent = 'Failed to load benchmark data: ' + err.message;
          return;
        }
        if (!model.totalBenches) {
          $('status').textContent = 'No benchmark data found yet.';
          return;
        }
        document.title = (model.repoUrl ? model.repoUrl.split('/').slice(-2).join('/') + ' ' : '') + 'benchmarks';
        const repoLink = $('repo-link');
        repoLink.href = model.repoUrl || '#';
        repoLink.textContent = model.repoUrl ? model.repoUrl.replace(/^https?:\/\//, '') : 'repository';
        $('summary-line').textContent = model.totalBenches + ' series · ' + model.totalRuns + ' runs · updated ' +
          (model.lastUpdate ? new Date(model.lastUpdate).toISOString().slice(0, 10) : 'n/a');

        $('status').hidden = true;
        $('toolbar').hidden = false;
        $('main').hidden = false;
        buildToolbar();

        $('lb-close').addEventListener('click', closeLightbox);
        $('lb-prev').addEventListener('click', function () { stepLightbox(-1); });
        $('lb-next').addEventListener('click', function () { stepLightbox(1); });
        for (const btn of $('lb-count').children) {
          btn.addEventListener('click', function () {
            const count = Number(btn.textContent);
            if (lightbox.count === count) return;
            lightbox.count = count;
            for (const b of $('lb-count').children) b.setAttribute('aria-pressed', String(b === btn));
            if (!$('lightbox').hidden) showLightboxCharts();
          });
        }
        document.addEventListener('keydown', function (event) {
          if ($('lightbox').hidden) return;
          if (event.key === 'Escape') closeLightbox();
          else if (event.key === 'ArrowLeft') stepLightbox(-1);
          else if (event.key === 'ArrowRight') stepLightbox(1);
        });

        renderSections();

        window.addEventListener('hashchange', function () {
          readHash();
          clampState();
          $('pkg-select').value = state.pkg;
          $('search').value = state.q;
          $('sort-select').value = state.sort;
          for (const b of $('metric-seg').children) {
            b.setAttribute('aria-pressed', String(b.textContent === state.metric));
          }
          const rangeLabel = state.range === 'all' ? 'all' : state.range + 'd';
          for (const b of $('range-seg').children) {
            b.setAttribute('aria-pressed', String(b.textContent === rangeLabel));
          }
          $('view-toggle').setAttribute('aria-pressed', String(state.view === 'compare'));
          renderSections();
        });
        if (window.matchMedia) {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', renderSections);
        }
      }

      boot();
    })();
  </script>
</body>
</html>
