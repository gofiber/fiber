name: Sync docs

on:
  push:
    branches: [main]
    paths: ['docs/**']
  release:
    types: [published]
  repository_dispatch:
    types: [sync-docs]
  workflow_dispatch:
    inputs:
      mode:
        description: 'push = sync current docs, release-all = version snapshot for latest release'
        type: choice
        options: [push, release-all]
        default: push

jobs:
  sync:
    uses: gofiber/.github/.github/workflows/sync-docs.yml@main
    with:
      repo-type: single
      source-dir: docs
      destination-dir: docs/core
      version-file: versions.json
      docusaurus-command: npm run docusaurus -- docs:version
      file-patterns: '*'
      commit-url: https://github.com/gofiber/fiber
      event-mode: >-
        ${{ github.event_name == 'workflow_dispatch' && inputs.mode
        || github.event_name == 'repository_dispatch' && 'push'
        || github.event_name }}
      tag-name: ${{ github.ref_name }}
    secrets:
      doc-sync-token: ${{ secrets.DOC_SYNC_TOKEN }}
